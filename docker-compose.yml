version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: aquamind_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: aquamind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  cache:
    image: redis:7-alpine
    container_name: aquamind_cache
    ports:
      - "6379:6379"
    restart: unless-stopped

  app:
    build: .
    container_name: aquamind_app
    ports:
      - "8501:8501"
    environment:
      - DB_URL=postgresql://postgres:postgrespassword@db:5432/aquamind
      - REDIS_HOST=cache
      - REDIS_PORT=6379
    depends_on:
      - db
      - cache
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: aquamind_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: aquamind_grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pgdata:
